name: catalyst_ui
description: "A flexible, theme-driven UI component library for Flutter. No Material or Cupertino dependency — fully customisable design tokens, colour schemes, typography, and user-defined component variants."
version: 0.1.7-beta
repository: https://github.com/ptrbrynt/catalyst_ui
issue_tracker: https://github.com/ptrbrynt/catalyst_ui/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  dartx: ^1.2.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  # catalyst_ui ships no fonts by default.
  # To use a custom font, declare it in your app's pubspec.yaml and
  # set CatalystTypography(fontFamily: 'YourFont') in your theme.
